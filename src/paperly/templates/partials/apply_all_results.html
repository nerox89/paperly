<!-- Apply-all results partial -->
<div class="flex items-center gap-3 text-sm">
  <span class="text-green-700 font-medium">✓ {{ applied }} übernommen</span>
  {% if skipped > 0 %}<span class="text-gray-500">· {{ skipped }} übersprungen</span>{% endif %}
  {% if errors > 0 %}<span class="text-red-600">· {{ errors }} Fehler</span>{% endif %}
  <a href="/review" class="text-blue-600 hover:text-blue-800 ml-2">↻ Aktualisieren</a>
</div>
