<!DOCTYPE html>
<html lang="de" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}paperly{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full">
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6">
    <a href="/" class="text-lg font-semibold text-gray-900">📄 paperly</a>
    <a href="/" class="text-sm text-gray-500 hover:text-gray-900">Inbox</a>
    <a href="/cleanup" class="text-sm text-gray-500 hover:text-gray-900">Aufräumen</a>
    <span class="ml-auto text-xs text-gray-400" id="stats-badge"
          hx-get="/stats" hx-trigger="load" hx-swap="innerHTML">
    </span>
  </nav>
  <main class="{% block main_class %}p-6{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
